    <script type="module" src="../nav.js"></script>

    <script type="module">
      const qs = new URLSearchParams(location.search);
      const id = qs.get("id");

      const titleEl = document.getElementById("title");
      const metaEl = document.getElementById("meta");
      const bodyEl = document.getElementById("body");
      const srcEl = document.getElementById("src");

      if (!id) {
        titleEl.textContent = "Статья не найдена";
      } else {
        const res = await fetch("./posts.json", { cache: "no-store" });
        const data = await res.json();
        const post = (data.posts || []).find((p) => String(p.id) === String(id));

        if (!post) {
          titleEl.textContent = "Статья не найдена";
        } else {
          document.title = `${post.title} — DSG`;
          titleEl.textContent = post.title;
          metaEl.innerHTML = [
            post.publishedAt ? `<span>${new Date(post.publishedAt).toLocaleDateString("ru-RU")}</span>` : "",
            post.author ? `<span>Автор: ${post.author}</span>` : ""
          ].filter(Boolean).join("<span>•</span>");

          const paragraphs = (post.rewrite || "")
            .split(/\n{2,}/)
            .map((p) => p.trim())
            .filter(Boolean)
            .map((p) => `<p>${p}</p>`)
            .join("");
          bodyEl.innerHTML = paragraphs || "<p>Текст статьи будет добавлен после сборки данных.</p>";

          srcEl.innerHTML = `
            <span class="badge">Источник: ${post.sourceLabel || post.source}</span>
            <span class="badge">Автор: ${post.author || "—"}</span>
            <a class="badge" href="${post.url}" target="_blank" rel="noreferrer">Открыть оригинал</a>
          `;
        }
      }
    </script>
