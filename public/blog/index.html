<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="./" />
    <title>Дайджесты — DSG</title>
    <meta
      name="description"
      content="Ежемесячные дайджесты по продуктовому дизайну на основе статей Medium, Designers и Хабра."
    />
    <meta
      name="keywords"
      content="дайджест, продуктовый дизайн, medium, habr, designers, ux, ui, дизайн-системы"
    />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <link rel="icon" href="../assets/brand/logo.png" type="image/png" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .digest-page {
        padding: 24px 0 40px;
      }
      .digest-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }
      .digest-title {
        margin: 0;
        font-size: 26px;
        font-weight: 850;
        letter-spacing: 0.2px;
        flex: 1 1 auto;
      }
      .digest-filters {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .digest-select {
        min-width: 120px;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font: inherit;
      }
      .digest-hero {
        border: 1px solid var(--border);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: var(--shadow);
        padding: 18px 18px 16px;
      }
      .digest-hero__title {
        margin: 0;
        font-size: 24px;
        font-weight: 850;
        line-height: 1.15;
      }
      .digest-hero__meta {
        margin-top: 10px;
        color: var(--muted);
        font-size: 14px;
      }
      .digest-list {
        margin-top: 4px;
        border: 1px solid var(--border);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .digest-item {
        display: block;
        padding: 18px;
        transition:
          background 140ms ease,
          transform 140ms ease,
          box-shadow 140ms ease;
      }
      .digest-item + .digest-item {
        border-top: 1px solid var(--border);
      }
      .digest-item:hover {
        background: rgba(255, 255, 255, 0.05);
        transform: translateY(-1px);
      }
      .digest-item__title {
        margin: 0;
        font-size: 18px;
        font-weight: 760;
        line-height: 1.25;
      }
      .digest-item__title a {
        color: inherit;
      }
      .digest-item__summary {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.5;
        font-size: 14px;
        font-weight: 400;
      }
      .digest-item__excerpt {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.5;
        font-size: 14px;
      }
      .digest-item__badges {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }
      .digest-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
        color: var(--text);
        font-size: 12px;
      }
      .digest-badge--rubric {
        border-color: rgba(124, 58, 237, 0.38);
      }
      .digest-badge--language {
        border-color: rgba(34, 197, 94, 0.38);
        color: rgba(187, 247, 208, 0.95);
      }
      .digest-empty {
        margin-top: 18px;
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: 18px;
        color: var(--muted);
      }
      .digest-sentinel {
        height: 1px;
      }
      @media (max-width: 820px) {
        .digest-toolbar {
          flex-direction: row;
          align-items: center;
        }
        .digest-filters {
          flex-wrap: nowrap;
        }
      }
      @media (max-width: 620px), (hover: none) and (pointer: coarse) {
        .digest-page {
          padding-top: 18px;
        }
        .digest-title {
          font-size: 22px;
        }
        .digest-filters {
          gap: 8px;
        }
        .digest-select {
          min-width: 0;
          flex: 0 1 auto;
          padding: 8px 10px;
        }
        .digest-hero {
          padding: 16px;
        }
        .digest-hero__title {
          font-size: 20px;
        }
        .digest-item {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body data-page="blog">

        </a>
        <div class="header__actions">
          <a class="btn btn--ghost" href="../">Каталог</a>
          <a class="btn btn--ghost btn--active" href="./" aria-current="page">Дайджесты</a>
          <a

    <main class="container digest-page">

      <section class="digest-hero" id="digest-hero" hidden>

      <section class="digest-list" id="digest-list" hidden></section>

      <div class="digest-sentinel" id="digest-sentinel" aria-hidden="true"></div>
    </main>

    <div class="mobile-nav-shell">

    </div>

    <footer class="footer">
      <div class="container">

        <div class="footer__meta">

      </div>
    </footer>

    <script type="module" src="../nav.js"></script>
