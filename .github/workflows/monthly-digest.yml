name: Monthly Digest Rebuild

on:
  schedule:
    - cron: '0 8 1 * *'   # 1-го числа каждого месяца в 08:00 UTC (11:00 МСК)
  workflow_dispatch:        # можно запустить вручную из GitHub

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Seed base from live site
        # Берём за основу опубликованное состояние с хоста, чтобы генерация
        # не теряла и не перегенерировала уже одобренные месяцы (хост —
        # источник правды; публикует бот после подтверждения).
        run: |
          curl -fsS https://dsg.lorrrem.ru/blog/digests.json -o public/blog/digests.json \
            && echo "Seeded base from live site" \
            || echo "No live digests yet — using repo copy"

      - name: Run content automation
        env:
          LLM_PROVIDER: claude
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-haiku-4-5-20251001
        run: node scripts/run-content-automation.mjs

      - name: Rewrite descriptions (quality pass)
        # Переписываем описания нового выпуска по правилам качества: свежий фетч
        # статей, параграфная экстракция, новый промпт, анти-штамп gate, Claude Haiku 4.5.
        # Работает по черновику (.cache/draft), который уходит боту на модерацию.
        env:
          LLM_PROVIDER: claude
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-haiku-4-5-20251001
        # Некритичный шаг: при сбое API/сети выпуск всё равно уходит боту
        # с описаниями от build-digests, а не ломает весь месячный прогон.
        run: node scripts/rewrite-digest-descriptions.mjs --latest --draft || echo "::warning::quality rewrite failed, fallback to build-digests summaries"

      - name: Commit published-state snapshot
        # Коммитим зеркало опубликованного состояния (база с хоста) как бэкап.
        # Сгенерированный новый месяц в git НЕ попадает — он уходит боту на
        # модерацию и публикуется на хост только после подтверждения.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/blog/posts.json public/blog/digests.json public/automation/status.json || true
          git diff --cached --quiet || git commit -m "chore: monthly digest snapshot $(date -u +%Y-%m)"
          git pull --rebase origin ${GITHUB_REF_NAME}
          git push

      - name: Hand off draft to bot for approval
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: node scripts/send-telegram-digest.mjs
