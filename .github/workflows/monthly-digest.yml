name: Monthly Digest Rebuild

on:
  schedule:
    - cron: '0 8 1 * *'   # 1-го числа каждого месяца в 08:00 UTC (11:00 МСК)
  workflow_dispatch:        # можно запустить вручную из GitHub

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run content automation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_DIGEST_MODEL: gpt-4o-mini
        run: node scripts/run-content-automation.mjs

      - name: Commit updated digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/blog/posts.json public/blog/digests.json public/automation/status.json || true
          git diff --cached --quiet || git commit -m "chore: monthly digest rebuild $(date -u +%Y-%m)"
          git pull --rebase origin main
          git push

      - name: Send Telegram preview to owner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_MY_ID: ${{ secrets.TELEGRAM_MY_ID }}
        run: |
          YEAR=$(jq '.digests[0].year' public/blog/digests.json)
          MONTH=$(jq '.digests[0].month' public/blog/digests.json)
          COUNT=$(jq '.digests[0].count' public/blog/digests.json)
          LABEL=$(jq -r '.digests[0].monthLabel' public/blog/digests.json)

          TEXT="🗞 *Новый дайджест DSG — ${LABEL} ${YEAR}*\n\n${COUNT} материалов готовы к публикации в @lorrrem\.\n\nОпубликовать анонс\?"

          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_MY_ID}\",
              \"text\": \"${TEXT}\",
              \"parse_mode\": \"MarkdownV2\",
              \"reply_markup\": {
                \"inline_keyboard\": [[
                  {\"text\": \"✅ Опубликовать\", \"callback_data\": \"publish_${YEAR}_${MONTH}_${COUNT}\"},
                  {\"text\": \"❌ Отмена\",       \"callback_data\": \"cancel\"}
                ]]
              }
            }")
          echo "Telegram response: $RESPONSE"
