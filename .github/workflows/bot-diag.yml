name: Bot Diag

# Диагностика webhook бота: getWebhookInfo (url, ошибки доставки, allowed_updates).
on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Re-register webhook + getWebhookInfo
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          echo "=== setWebhook (refresh) ==="
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            -d "url=https://dsg.lorrrem.ru/bot/webhook.php" \
            -d "secret_token=${WEBHOOK_SECRET}" \
            -d 'allowed_updates=["callback_query","message"]'
          echo; echo "=== getWebhookInfo ==="
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo" \
            | python3 -c "import sys,json; d=json.load(sys.stdin).get('result',{}); print('url:',d.get('url')); print('pending_update_count:',d.get('pending_update_count')); print('last_error_message:',d.get('last_error_message')); print('last_error_date:',d.get('last_error_date')); print('allowed_updates:',d.get('allowed_updates'))"
