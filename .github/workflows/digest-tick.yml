name: Digest Tick

on:
  # Расписание отключено: tick теперь крутит системный таймер на VPS
  # (dsg-tick.timer). Бот живёт на VPS, REG.RU-вебхук снят.
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Ping bot tick
        # Бот сам решает: напомнить, авто-опубликовать или дождаться
        # отложенного времени (логика — в public/bot/webhook.php).
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          RESPONSE=$(curl -fsS -H "X-Bot-Secret: ${WEBHOOK_SECRET}" \
            "https://dsg.lorrrem.ru/bot/webhook.php?action=tick") || RESPONSE="tick request failed"
          echo "Tick response: $RESPONSE"
