name: Deploy to REG.RU via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate bot config
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_MY_ID: ${{ secrets.TELEGRAM_MY_ID }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          {
            echo "<?php"
            echo "define('BOT_TOKEN',      '${TELEGRAM_BOT_TOKEN}');"
            echo "define('MY_CHAT_ID',     '${TELEGRAM_MY_ID}');"
            echo "define('CHANNEL_ID',     '@lorrrem');"
            echo "define('WEBHOOK_SECRET', '${WEBHOOK_SECRET}');"
          } > public/bot/config.php
          echo "Config generated: $(wc -c < public/bot/config.php) bytes"

      - name: Deploy public/ to dsg.lorrrem.ru
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 31.31.198.114
          port: 21
          protocol: ftps
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: /
          timeout: 60000

      # ВАЖНО: webhook Telegram теперь указывает на VPS (195.133.15.12:8443).
      # Шаг setWebhook→REG.RU убран намеренно — иначе деплой сайта «утаскивал» бы
      # webhook обратно на REG.RU и ломал бота на сервере. Бот живёт на VPS.
