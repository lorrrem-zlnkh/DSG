name: Deploy to REG.RU via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy public/ to dsg.lorrrem.ru
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 31.31.198.114
          port: 21
          protocol: ftps
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: /
          timeout: 60000
