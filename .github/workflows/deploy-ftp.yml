name: Deploy to REG.RU via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate bot config
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_MY_ID: ${{ secrets.TELEGRAM_MY_ID }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          {
            echo "<?php"
            echo "define('BOT_TOKEN',      '${TELEGRAM_BOT_TOKEN}');"
            echo "define('MY_CHAT_ID',     '${TELEGRAM_MY_ID}');"
            echo "define('CHANNEL_ID',     '@lorrrem');"
            echo "define('WEBHOOK_SECRET', '${WEBHOOK_SECRET}');"
          } > public/bot/config.php
          echo "Config generated: $(wc -c < public/bot/config.php) bytes"

      - name: Deploy public/ to dsg.lorrrem.ru
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 31.31.198.114
          port: 21
          protocol: ftps
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: /
          timeout: 60000

      - name: Register Telegram webhook
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          RESPONSE=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            -d "url=https://dsg.lorrrem.ru/bot/webhook.php" \
            -d "secret_token=${WEBHOOK_SECRET}" \
            -d "allowed_updates=[\"callback_query\"]")
          echo "Webhook response: $RESPONSE"
